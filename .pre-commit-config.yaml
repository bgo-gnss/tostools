# Pre-commit hooks for tostools
# Install with: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Code formatting
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: [--check]
        language_version: python3

  # Linting  
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  # GPS/GNSS standards compliance validation
  - repo: local
    hooks:
      - id: gps-standards-validation
        name: GPS/GNSS Standards Compliance Check
        entry: python scripts/update_standards.py --validate-only
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-r, src/]
        exclude: tests/