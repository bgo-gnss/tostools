# === TOS Attribute Codes Catalog ===
#
# Three top-level entity scopes (matching TOS hierarchy):
#   devices:    Tæki — gnss_receiver, antenna, radome (also Innviði: monument)
#   locations:  Staðsetning — physical sites that contain stations
#   stations:   Stöð — Jarðeðlisstöð (geophysical station)
#
# Per-code schema:
#   icelandic_label   — TOS UI display name (Icelandic)
#   description       — Short English summary
#   classification    — inherent | mutable | TODO   <-- USER FILLS IN
#                       inherent = property of the physical device, never legitimately changes
#                       mutable  = can legitimately transition mid-life (e.g. firmware bumps)
#
#                       Polymorphic — accepts EITHER a scalar OR a per-subtype dict:
#
#                         classification: inherent              # scalar — applies to every
#                                                               # subtype in applies_to
#
#                         classification:                       # dict — when classification
#                           antenna: mutable                    # varies by subtype (e.g.
#                           monument: inherent                  # antenna_offset_* codes are
#                                                               # mutable on antenna,
#                                                               # inherent on monument)
#   tos_required_for  — [subtype, ...] subtypes where TOS form marks this required (informational)
#   gps_required_for  — [subtype, ...] subtypes where WE require this for ops    <-- USER FILLS IN
#                       (drives a future `tos audit missing-attributes` verb;
#                        usually equal to or a strict superset of tos_required_for)
#   applies_to        — [subtype, ...] subtypes where the attribute can be set
#   default_value     — value the audit expects when nothing is recorded         <-- USER OPTIONAL
#                       (use ~ for null / unknown; quote strings)
#   gps_relevance     — yes | maybe | no       <-- USER REVIEWS / REMOVES NO ENTRIES
#                       yes   = used by GPS tooling (site log, GAMIT, audit)
#                       maybe = could be relevant in some flow, not sure
#                       no    = clearly seismic/meteorological/hydrological/camera
#   subtypes_observed — [...] from script harvest (143 GPS devices across 10 stations)
#   sample_values     — [...] from harvest (max 3)
#   n_devices         — count in harvest sample
#   walked            — true if seen in the harvest; false if added from screenshot only
#   why               — "" — reasoning/notes (user fills in for edge cases)
#
# To complete: replace each `classification: TODO` with inherent or mutable;
# review and remove any `gps_relevance: no` entries you confirm are out of scope.

# =============================================================================
# DEVICES (Tæki + Innviði/monument)
# =============================================================================
